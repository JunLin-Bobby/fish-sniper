name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Guard against SKIP_AUTH=true in CI
        working-directory: ${{ github.workspace }}
        run: |
          if rg -n --no-ignore-parent \
              --glob ".env*" \
              --glob "*.toml" \
              --glob "*.yml" \
              --glob "*.yaml" \
              "^[[:space:]]*SKIP_AUTH[[:space:]]*=[[:space:]]*true([[:space:]]*(#.*)?)?$" backend/ frontend/; then
            echo "ERROR: SKIP_AUTH=true found in a committed config file"
            exit 1
          fi

      - name: Test (pytest)
        run: pytest -v

  frontend:
    name: Frontend — type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type-check + bundle)
        run: npm run build
